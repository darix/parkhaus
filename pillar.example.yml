## per minion config

{%- set rpc_port = 3901 %}
{%- set admin_port = 3903 %}
{%- set location = "eu-west-1" %}
{%- set main_tag = "ins" %}
{%- set rpc_bind_addr = '0.0.0.0' %}
{%- set admin_bind_addr = '127.0.0.1' %}
{%- set services_bind_addr = '127.0.0.1' %}
{%- set capacity = 1 * 1024 * 1024 * 1024 %}
{%- set bucket_list = ['patroni', 'restic' ] %}

garage:
  {%- set node_key = "garage/" ~ grains.id ~ "/node_key_base64" %}
  {%- set node_key_pub = "garage/" ~ grains.id ~ "/node_key_pub_base64" %}
  node_key_base64:     {{ node_key     | gopass }}
  node_key_pub_base64: {{ node_key_pub | gopass }}

## in the roles pillar file:

garage:
  storage_dir: /var/lib/garage

  ## both of those values default to False
  # purge_unmanaged_buckets: True
  # purge_unmanaged_keys: True

  ## by default we run all the config steps on the first node in the bootstrap_peers list
  # primary_node: somenodeid

  config:
    # by default the 2 directories will be created relative to storage_dir
    # metadata_dir: {storage_dir}/meta
    # data_dir:     {storge_dir}/data
    db_engine: lmdb

    replication_factor: 1

    rpc_bind_addr:   "{{ rpc_bind_addr }}:{{ rpc_port }}"
    rpc_public_addr: "{{ rpc_bind_addr }}:{{ rpc_port }}"
    rpc_secret: {{ "garage/rpc_secret" | gopass }}

    bootstrap_peers:
      {%- for node in [1,2,3,4 ] %}
      {%- set host = "garage-" ~ node %}
      {%- set node_id = "garage/" ~ host ~ "/node_identifier_secret" %}
      - {{ node_id | gopass(quoted=False) }}@{{ host }}.{{ grains.domain }}:{{ rpc_port }}
      {%- endfor %}

    s3_api:
      s3_region: {{ location }}
      api_bind_addr: "{{ services_bind_addr }}:3900"
      root_domain: ".s3.garage.localhost"

    s3_web:
      bind_addr: "{{ services_bind_addr }}:3902"
      root_domain: ".web.garage.localhost"
      index: "index.html"

    k2v_api:
      api_bind_addr: "{{ services_bind_addr }}:3904"

    admin:
      api_bind_addr: "{{ admin_bind_addr }}:{{ admin_port }}"
      admin_token:   {{ "garage/admin_token" | gopass }}
      metrics_token: {{ "garage/metrics_token" | gopass }}

  layout:
    zone: {{ location }}
    capacity: {{ capacity }}
    tags:
      - {{ main_tag }}
    apply: True
    lock_file: ".salt_cluster_layout.lock"

  keys:
    {%- for bucket in bucket_list %}
    {{ bucket }}:
      {%- set key_id     = "garage/keys/" ~ bucket ~ "/key_id"     %}
      {%- set secret_key = "garage/keys/" ~ bucket ~ "/secret_key" %}
      key_id:     {{ key_id     | gopass }}
      secret_key: {{ secret_key | gopass }}
    {%- endfor %}

  buckets:
    {%- for bucket in bucket_list %}
    - name: {{ bucket }}
      keys:
        # references the key above
        {{ bucket }}:
          owner: true
          read: true
          write: true
    {%- endfor %}